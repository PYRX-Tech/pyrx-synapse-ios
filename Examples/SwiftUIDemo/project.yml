name: SwiftUIDemo
options:
  bundleIdPrefix: tech.pyrx.synapse
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
# Apply build-time PYRX config from Config.xcconfig. The xcconfig defines
# PYRX_WORKSPACE_ID + PYRX_API_KEY + PYRX_BASE_URL with safe production
# defaults; an optional Config.local.xcconfig (gitignored) overrides for
# local dev. These flow into Info.plist via the `info.properties` keys
# below, then SwiftUIDemoApp.swift reads them at runtime.
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    # CODE_SIGNING_ALLOWED, CODE_SIGN_IDENTITY, DEVELOPMENT_TEAM, and
    # PROVISIONING_PROFILE_SPECIFIER are intentionally NOT hardcoded here.
    # They flow from Config.xcconfig (production placeholders) and
    # Config.local.xcconfig (gitignored, user-specific team). Real-device
    # builds need signing on; CI Simulator builds set
    # CODE_SIGNING_ALLOWED=NO via the xcodebuild command line
    # (e.g. `xcodebuild build -destination 'generic/platform=iOS Simulator'
    # CODE_SIGNING_ALLOWED=NO`).
    ENABLE_BITCODE: NO
    GENERATE_INFOPLIST_FILE: NO
    # Xcode 16+ defaults to ENABLE_DEBUG_DYLIB=YES, which splits the app
    # binary into a tiny `<App>` stub + a `<App>.debug.dylib` that the stub
    # dlopens at launch. That layout is REQUIRED for in-app SwiftUI Previews
    # of executable targets, but it routinely BREAKS standalone launches on
    # real devices: when the app is launched outside an Xcode "Run" session
    # (e.g. tapped from the home screen, or launched via `devicectl process
    # launch`), the stub silently fails to load the debug dylib and the
    # user sees a permanently black screen. The process stays alive, the
    # UIWindowScene reports SceneReady, but @main never runs because the
    # real `App` type lives in the unloaded dylib.
    #
    # We don't need this sample app to be previewable in Xcode — it's a
    # manual-test surface, not a design canvas — so force the classic
    # static-link layout on both Debug AND Release. Fixes the black-screen
    # on-device launch under Xcode 16+ / 26.
    #
    # See: https://developer.apple.com/forums/thread/812649 and the
    # broader Xcode 16 debug-dylib regression cluster.
    ENABLE_DEBUG_DYLIB: NO
packages:
  PYRXSynapse:
    # Local path to the SDK at the repo root. Xcode resolves SPM packages
    # relative to the workspace, so this stays valid when the demo is
    # opened standalone via `Examples/SwiftUIDemo/SwiftUIDemo.xcodeproj`.
    path: "../.."
schemes:
  SwiftUIDemo:
    build:
      targets:
        SwiftUIDemo: all
targets:
  SwiftUIDemo:
    type: application
    platform: iOS
    sources:
      - path: SwiftUIDemo
        excludes:
          - "Info.plist"
          - "SwiftUIDemo.entitlements"
    resources: []
    info:
      path: SwiftUIDemo/Info.plist
      properties:
        CFBundleDisplayName: PYRX Synapse Demo
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
        # PYRX config injected at build time from Config.xcconfig (production
        # defaults) + optional Config.local.xcconfig (dev overrides).
        # SwiftUIDemoApp.swift reads these via Bundle.main.object(forInfoDictionaryKey:).
        PyrxWorkspaceId: $(PYRX_WORKSPACE_ID)
        PyrxApiKey: $(PYRX_API_KEY)
        PyrxBaseUrl: $(PYRX_BASE_URL)
    entitlements:
      path: SwiftUIDemo/SwiftUIDemo.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.pyrx.synapse.swiftuidemo
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: SwiftUIDemo/Info.plist
        CODE_SIGN_ENTITLEMENTS: SwiftUIDemo/SwiftUIDemo.entitlements
    dependencies:
      - package: PYRXSynapse
        product: PYRXSynapse
