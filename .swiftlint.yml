# SwiftLint configuration for PYRXSynapse iOS SDK
# Run locally: swiftlint --strict
# CI installs swiftlint via brew (see .github/workflows/ci.yml).

included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData
  - Examples/SwiftUIDemo/Pods
  - .swiftpm

disabled_rules:
  - todo                  # Allow TODO comments during multi-PR rollout
  - trailing_comma        # Conflicts with Swift idioms in multi-line literals

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - i
    - x
    - y

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 4

reporter: "xcode"
