name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spm-build-test:
    name: SPM build + test (macOS, Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        xcode: ['15.4']
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  swiftlint:
    name: SwiftLint (strict)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint --strict
        run: swiftlint --strict

  pod-lint:
    name: CocoaPods lib lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: pod lib lint
        run: pod lib lint PYRXSynapse.podspec --allow-warnings --skip-tests

  xcodebuild-sim:
    name: xcodebuild (iOS Simulator, library build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -scheme PYRXSynapse \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            build
